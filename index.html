<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 활동 일정표</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #e4e7ec;
  --text: #111827;
  --text-sub: #6b7280;
  --primary: #3b82f6;
  --primary-light: #eff6ff;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --header-h: 62px;
  --nav-h: 0px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.spin{width:38px;height:38px;border:3px solid #e5e7eb;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Header (PC 최적화) ── */
.hdr{position:sticky;top:0;z-index:50;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-title{font-size:16px;font-weight:800;white-space:nowrap;letter-spacing:-.3px;color:var(--text);margin-right:4px}
.period-nav{display:flex;align-items:center;gap:4px;flex-shrink:0}
.period-nav button{background:none;border:1px solid var(--border);cursor:pointer;padding:5px 12px;font-size:18px;color:var(--text);border-radius:6px;line-height:1;transition:background .12s}
.period-nav button:hover{background:var(--bg)}
.period-lbl{font-size:15px;font-weight:700;min-width:80px;text-align:center}

/* ── Top Navigation ── */
.tnav-wrap{display:flex;align-items:center;gap:2px;margin:0 12px}
.tnav-item{background:none;border:none;cursor:pointer;padding:7px 18px;font-size:13px;font-weight:700;color:var(--text-sub);border-radius:8px;font-family:inherit;transition:all .15s;white-space:nowrap;position:relative}
.tnav-item:hover{background:var(--bg);color:var(--text)}
.tnav-item.on{background:var(--primary-light);color:var(--primary)}
.nbadge{display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;padding:0 3px;margin-left:4px;vertical-align:middle}

.hdr-spacer{flex:1}
.hdr-action{background:var(--primary);color:#fff;border:none;cursor:pointer;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;transition:opacity .12s;white-space:nowrap}
.hdr-action:hover{opacity:.88}

/* ── Bottom Nav (hidden on PC) ── */
.bnav{display:none}

/* ── Pages ── */
.page{display:none;padding:22px 28px 28px;max-width:1400px;margin:0 auto}
.page.on{display:block}
.pg-title{font-size:18px;font-weight:800;margin-bottom:16px}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:10px;background:var(--surface);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.lg-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.lg-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}

/* ── Calendar ── */
.cal-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:#f9fafb;border-bottom:1px solid var(--border)}
.ch{padding:10px 4px;text-align:center;font-size:13px;font-weight:700;color:var(--text-sub)}
.ch.sun{color:#ef4444}.ch.sat{color:#3b82f6}
.cal-body{display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-week:last-child{border-bottom:none}

.cell{min-height:130px;padding:7px 6px;border-right:1px solid var(--border);cursor:pointer;position:relative;transition:background .12s}
.cell:last-child{border-right:none}
.cell:hover{background:rgba(0,0,0,.025)}
.cell.out{background:#fafafa;cursor:default;opacity:.4}
.cell.out:hover{background:#fafafa}
.cell.today{outline:2px solid var(--primary);outline-offset:-2px}
.cell.holiday{background:#fff5f5!important}
.cell.sunday .dnum{color:#ef4444}
.cell.saturday .dnum{color:#3b82f6}
.cell.holiday .dnum{color:#ef4444}

.dnum{font-size:13px;font-weight:700;margin-bottom:3px}
.hname{font-size:10px;color:#ef4444;margin-bottom:3px;line-height:1.3}
.cteam{font-size:12px;font-weight:800;margin-bottom:2px;line-height:1.3}
.cmembers{font-size:11px;color:rgba(0,0,0,.65);line-height:1.45;margin-bottom:3px}
.cbadges{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}

.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.b-dayoff{background:#dcfce7;color:#166534}
.b-ham{background:#dbeafe;color:#1d4ed8}
.b-hpm{background:#ede9fe;color:#5b21b6}
.b-carried{background:#fef3c7;color:#92400e}
.b-warn{background:#fee2e2;color:#991b1b}
.b-vol{background:#f0fdf4;color:#14532d}

/* ── Notifications ── */
.notif-item{background:var(--surface);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
.notif-item.unread{border-left:3px solid var(--primary)}
.ni-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.ni-body{flex:1;min-width:0}
.ni-msg{font-size:14px;line-height:1.5;margin-bottom:4px}
.ni-time{font-size:12px;color:var(--text-sub)}
.ni-readbtn{background:none;border:none;cursor:pointer;color:var(--text-sub);font-size:18px;padding:0 4px;flex-shrink:0}
.ni-readbtn:hover{color:var(--primary)}
.empty{text-align:center;padding:60px 16px;color:var(--text-sub)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:14px}

/* ── Settings ── */
.sec{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:13px 18px;font-size:14px;font-weight:800;background:#f9fafb;border-bottom:1px solid var(--border);letter-spacing:.2px}
.sec-body{padding:16px 18px}

.tcard{border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:12px}
.tcard-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.t-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,.1);flex-shrink:0;position:relative}
.t-color-inp{opacity:0;position:absolute;inset:0;cursor:pointer;border-radius:50%}
.t-name{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;font-weight:700;font-family:inherit;min-width:0}
.t-name:hover{border-color:var(--primary)}
.t-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.t-toggle:hover{border-color:var(--primary);color:var(--primary)}
.t-toggle.on{background:var(--primary);color:#fff;border-color:var(--primary)}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px}
.chip button{background:none;border:none;cursor:pointer;color:#aaa;font-size:14px;padding:0;line-height:1;transition:color .12s}
.chip button:hover{color:var(--danger)}

.addrow{display:flex;gap:6px}
.addrow input{flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;min-width:0}
.addrow input:hover,.addrow input:focus{border-color:var(--primary);outline:none}

.lrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.lrow:last-child{border-bottom:none}
.lrow-info{flex:1;min-width:0}
.lrow-t{font-size:14px;font-weight:700}
.lrow-s{font-size:12px;color:var(--text-sub);margin-top:2px}

/* ── Buttons ── */
.btn{border:none;border-radius:7px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit;line-height:1;transition:all .12s}
.btn:hover{opacity:.88}
.btn-p{background:var(--primary);color:#fff}
.btn-d{background:var(--danger);color:#fff}
.btn-g{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-g:hover{border-color:#9ca3af}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;padding:12px;font-size:14px}

/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface);width:520px;border-radius:14px;max-height:86vh;overflow-y:auto;padding:24px 22px 28px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.sh-handle{display:none}
.sh-title{font-size:16px;font-weight:800;margin-bottom:16px}

.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fsel,.finp{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .12s}
.fsel:hover,.finp:hover,.fsel:focus,.finp:focus{border-color:var(--primary);outline:none}

.radio-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.radio-g.three{grid-template-columns:1fr 1fr 1fr}
.ropt{border:2px solid var(--border);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;font-size:13px;font-weight:700;transition:all .12s;line-height:1.4}
.ropt:hover{border-color:var(--primary);background:var(--primary-light)}
.ropt small{font-size:11px;font-weight:400;opacity:.7}
.ropt.on{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}

.sh-acts{display:flex;gap:8px;margin-top:20px}
.sh-acts .btn{flex:1;padding:12px}

.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.warn-box-title{font-size:13px;font-weight:800;color:#92400e;margin-bottom:3px}
.warn-box-sub{font-size:12px;color:#78350f}

/* ── Dayoff Sheet ── */
.do-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.do-row:last-child{border-bottom:none}
.do-name{font-size:14px;font-weight:700;min-width:72px}
.do-status{flex:1;font-size:13px;color:var(--text-sub)}
.do-date{font-size:13px;color:var(--text);font-weight:600}

/* ── Member checkboxes ── */
.mem-checks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.mem-check{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:600;transition:all .12s}
.mem-check:hover{border-color:var(--primary)}
.mem-check.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.mem-check input{display:none}

/* ── Comp per member ── */
.comp-member-block{background:#f8f9ff;border:1px solid #dbeafe;border-radius:8px;padding:12px;margin-top:8px}
.cmb-name{font-size:13px;font-weight:800;color:var(--primary);margin-bottom:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:#1f2937;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Info box ── */
.info-box{background:var(--primary-light);border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#1d4ed8;line-height:1.5}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spin"></div>
  <div style="font-size:13px;color:#9ca3af">데이터 불러오는 중...</div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Header (PC 최적화) -->
  <header class="hdr">
    <div class="hdr-title">🗓 영업 활동 일정표</div>
    <div class="period-nav" id="calPeriodNav">
      <button onclick="changePeriod(-1)">‹</button>
      <span class="period-lbl" id="pLabel">-</span>
      <button onclick="changePeriod(1)">›</button>
    </div>
    <div class="tnav-wrap">
      <button class="tnav-item on" id="tn-calendar" onclick="goPage('calendar')">📅 캘린더</button>
      <button class="tnav-item" id="tn-notify" onclick="goPage('notify')">🔔 알림<span class="nbadge" id="nbadge" style="display:none">0</span></button>
      <button class="tnav-item" id="tn-settings" onclick="goPage('settings')">⚙️ 설정</button>
    </div>
    <div class="hdr-spacer"></div>
    <button class="hdr-action" onclick="openDayoffSheet()">📋 월차 관리</button>
  </header>

  <!-- Calendar Page -->
  <div id="pg-calendar" class="page on">
    <div class="legend" id="legend"></div>
    <div class="cal-wrap">
      <div class="cal-hdr">
        <div class="ch sun">일</div><div class="ch">월</div><div class="ch">화</div>
        <div class="ch">수</div><div class="ch">목</div><div class="ch">금</div>
        <div class="ch sat">토</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>

  <!-- Notifications Page -->
  <div id="pg-notify" class="page">
    <div class="pg-title">🔔 알림</div>
    <div id="notifList"></div>
  </div>

  <!-- Settings Page -->
  <div id="pg-settings" class="page">
    <div class="pg-title">⚙️ 설정</div>

    <div class="sec">
      <div class="sec-hdr">영업조 관리</div>
      <div class="sec-body" id="teamSettings"></div>
    </div>

    <div class="sec">
      <div class="sec-hdr">영업일 관리</div>
      <div class="sec-body">
        <div id="periodSettings"></div>
        <button class="btn btn-g btn-full" style="margin-top:8px" onclick="addPeriodPrompt()">+ 영업 월 추가</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-hdr">달력 내보내기</div>
      <div class="sec-body">
        <div style="display:flex;gap:10px;margin-bottom:10px">
          <button class="btn btn-p" style="flex:1" onclick="copyToExcel()">📋 클립보드 복사 (붙여넣기용)</button>
          <button class="btn btn-g" style="flex:1" onclick="saveExcel()">💾 엑셀 파일로 저장</button>
        </div>
        <div style="font-size:12px;color:var(--text-sub)">클립보드 복사: 엑셀에서 Ctrl+V&nbsp;&nbsp;|&nbsp;&nbsp;파일 저장: .xls 직접 다운로드</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-hdr">데이터 백업/복원</div>
      <div class="sec-body">
        <div style="display:flex;gap:8px">
          <button class="btn btn-g" style="flex:1" onclick="exportData()">📥 JSON 내보내기</button>
          <label class="btn btn-g" style="flex:1;text-align:center;cursor:pointer;line-height:2">
            📤 JSON 가져오기<input type="file" accept=".json" style="display:none" onchange="importData(event)">
          </label>
        </div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:8px">가져오기 시 현재 데이터가 모두 교체됩니다</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-hdr">공휴일 관리</div>
      <div class="sec-body">
        <div id="holidaySettings"></div>
        <div class="addrow" style="margin-top:10px">
          <input type="date" id="hDate" class="finp" style="flex:.9">
          <input type="text" id="hName" class="finp" style="flex:1.1" placeholder="공휴일 이름">
          <button class="btn btn-p btn-sm" onclick="addHoliday()">추가</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- Schedule Edit Sheet -->
<div class="overlay" id="schedOverlay" onclick="overlayClose('schedOverlay',event)">
  <div class="sheet">
    <span class="sh-handle"></span>
    <div class="sh-title" id="schedTitle">배정 편집</div>

    <div class="fg" id="teamSelFg">
      <label class="fl">영업조</label>
      <select class="fsel" id="teamSel" onchange="onTeamChange()">
        <option value="">-- 배정 없음 --</option>
      </select>
    </div>

    <div class="fg" id="typeSection">
      <label class="fl">근무 유형</label>
      <div id="typeGrid" class="radio-g three"></div>
    </div>

    <!-- Weekend compensation / Volunteer section -->
    <div id="compSection" style="display:none">
      <div class="warn-box" id="compWarnBox">
        <div class="warn-box-title" id="compWarnTitle">⚡ 주말 근무 보상 설정</div>
        <div class="warn-box-sub" id="compWarnSub">근무자를 선택하고 보상 유형을 지정하세요</div>
      </div>
      <div class="fg">
        <label class="fl" id="memChecksLabel">근무한 직원</label>
        <div class="mem-checks" id="memChecks"></div>
        <div class="addrow" id="volCustomRow" style="display:none;margin-top:6px">
          <input type="text" id="volCustomInp" class="finp" placeholder="직원 이름 직접 입력">
          <button class="btn btn-p btn-sm" onclick="addVolCustom()">추가</button>
        </div>
      </div>
      <div id="compPerMember"></div>
    </div>

    <div class="sh-acts">
      <button class="btn btn-g" onclick="overlayClose('schedOverlay')">취소</button>
      <button class="btn btn-d btn-sm" id="delBtn" onclick="deleteSchedule()" style="display:none">삭제</button>
      <button class="btn btn-p" onclick="saveSchedule()">저장</button>
    </div>
  </div>
</div>

<!-- Monthly Dayoff Sheet -->
<div class="overlay" id="dayoffOverlay" onclick="overlayClose('dayoffOverlay',event)">
  <div class="sheet">
    <span class="sh-handle"></span>
    <div class="sh-title" id="doTitle">이번 달 월차 현황</div>
    <div class="info-box">📌 직원별 월차 날짜를 지정하세요. 월 1회 제공됩니다.</div>
    <div id="doContent"></div>
    <div style="margin-top:14px">
      <button class="btn btn-g btn-full" onclick="overlayClose('dayoffOverlay')">닫기</button>
    </div>
  </div>
</div>

<!-- Period Add/Edit Sheet -->
<div class="overlay" id="periodOverlay" onclick="overlayClose('periodOverlay',event)">
  <div class="sheet">
    <span class="sh-handle"></span>
    <div class="sh-title" id="periodSheetTitle">영업 월 추가</div>
    <div class="fg" id="periodKeyFg">
      <label class="fl">영업 월 키</label>
      <input type="text" class="finp" id="pKey" placeholder="예: 2026-07">
    </div>
    <div class="fg">
      <label class="fl">이름</label>
      <input type="text" class="finp" id="pLabelInp" placeholder="예: 7월 영업">
    </div>
    <div class="fg">
      <label class="fl">시작일</label>
      <input type="date" class="finp" id="pStart">
    </div>
    <div class="fg">
      <label class="fl">종료일</label>
      <input type="date" class="finp" id="pEnd">
    </div>
    <div class="fg">
      <label class="fl">영업일수</label>
      <input type="number" class="finp" id="pWorkDays" placeholder="0" min="0">
    </div>
    <div class="sh-acts">
      <button class="btn btn-g" onclick="overlayClose('periodOverlay')">취소</button>
      <button class="btn btn-p" onclick="savePeriodSheet()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIG

async function loadAll() {
  const [t,p,h,sch,comp,do_,n] = await Promise.all([
    db.from('teams').select('*').order('sort_order'),
    db.from('business_periods').select('*').order('start_date'),
    db.from('holidays').select('*'),
    db.from('schedules').select('*'),
    db.from('compensations').select('*'),
    db.from('monthly_dayoffs').select('*'),
    db.from('notifications').select('*').order('created_at',{ascending:false}).limit(60),
  ]);
  if(t.error) throw t.error;
  S.teams = t.data||[];
  S.periods = p.data||[];
  S.holidays = {};
  (h.data||[]).forEach(x=>S.holidays[x.date]=x.name);
  S.schedules = {};
  (sch.data||[]).forEach(x=>S.schedules[x.date]=x);
  // Index compensations by comp_date and work_date
  S.comps = {}; S.compsByWork = {};
  (comp.data||[]).forEach(x=>{
    if(x.comp_date){
      (S.comps[x.comp_date]=S.comps[x.comp_date]||[]).push(x);
    }
    (S.compsByWork[x.work_date]=S.compsByWork[x.work_date]||[]).push(x);
  });
  // Index dayoffs
  S.dayoffs = {};
  (do_.data||[]).forEach(x=>{
    if(!S.dayoffs[x.period_key]) S.dayoffs[x.period_key]={};
    S.dayoffs[x.period_key][x.member_name]=x;
  });
  S.notifs = n.data||[];
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REALTIME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setupRealtime() {
  db.channel('rt-sch').on('postgres_changes',{event:'*',schema:'public',table:'schedules'},async()=>{
    const {data}=await db.from('schedules').select('*');
    S.schedules={};(data||[]).forEach(x=>S.schedules[x.date]=x);
    renderCalendar();
  }).subscribe();

  db.channel('rt-comp').on('postgres_changes',{event:'*',schema:'public',table:'compensations'},async()=>{
    const {data}=await db.from('compensations').select('*');
    S.comps={};S.compsByWork={};
    (data||[]).forEach(x=>{
      if(x.comp_date)(S.comps[x.comp_date]=S.comps[x.comp_date]||[]).push(x);
      (S.compsByWork[x.work_date]=S.compsByWork[x.work_date]||[]).push(x);
    });
    renderCalendar();
  }).subscribe();

  db.channel('rt-do').on('postgres_changes',{event:'*',schema:'public',table:'monthly_dayoffs'},async()=>{
    const {data}=await db.from('monthly_dayoffs').select('*');
    S.dayoffs={};
    (data||[]).forEach(x=>{
      if(!S.dayoffs[x.period_key])S.dayoffs[x.period_key]={};
      S.dayoffs[x.period_key][x.member_name]=x;
    });
    renderCalendar();
  }).subscribe();

  db.channel('rt-notif').on('postgres_changes',{event:'*',schema:'public',table:'notifications'},async()=>{
    const {data}=await db.from('notifications').select('*').order('created_at',{ascending:false}).limit(60);
    S.notifs=data||[];
    updateBadge();
    if(S.page==='notify') renderNotifs();
  }).subscribe();
}

// PERIOD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function guessCurrentPeriod() {
  if(!S.periods.length) return null;
  const today=fmtDate(new Date());
  for(const p of S.periods) if(today>=p.start_date&&today<=p.end_date) return p.period_key;
  const fut=S.periods.filter(p=>p.start_date>today);
  return fut.length?fut[0].period_key:S.periods[S.periods.length-1].period_key;
}

function curPeriod(){ return S.periods.find(p=>p.period_key===S.periodKey)||null; }

function changePeriod(d) {
  if(!S.periods.length) return;
  const i=S.periods.findIndex(p=>p.period_key===S.periodKey);
  const ni=i+d;
  if(ni>=0&&ni<S.periods.length){ S.periodKey=S.periods[ni].period_key; renderCalendar(); }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CALENDAR RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCalendar() {
  const period=curPeriod();
  if(!period){
    document.getElementById('calBody').innerHTML='<div style="padding:36px;text-align:center;color:#9ca3af;font-size:13px">영업 월 데이터가 없습니다<br><small>설정에서 영업일을 추가하세요</small></div>';
    document.getElementById('pLabel').textContent='-';
    return;
  }
  document.getElementById('pLabel').textContent=period.label||period.period_key;
  renderLegend();

  const sd=parseDt(period.start_date), ed=parseDt(period.end_date);
  const cs=new Date(sd); while(cs.getDay()!==0) cs.setDate(cs.getDate()-1);
  const ce=new Date(ed); while(ce.getDay()!==6) ce.setDate(ce.getDate()+1);

  const todayStr=fmtDate(new Date());
  const body=document.getElementById('calBody');
  body.innerHTML='';

  const cur=new Date(cs);
  while(cur<=ce) {
    const weekEl=document.createElement('div');
    weekEl.className='cal-week';
    for(let i=0;i<7;i++){
      const ds=fmtDate(cur);
      const dw=cur.getDay();
      const inP=ds>=period.start_date&&ds<=period.end_date;
      const isH=!!S.holidays[ds];
      const isSun=dw===0, isSat=dw===6, isWknd=isSun||isSat;

      const sched=S.schedules[ds];
      const team=sched?S.teams.find(t=>t.id===sched.team_id):null;

      const cell=document.createElement('div');
      cell.className='cell'
        +(!inP?' out':'')
        +(isSun?' sunday':'')
        +(isSat?' saturday':'')
        +(isH?' holiday':'')
        +(ds===todayStr?' today':'');

      if(team&&inP) cell.style.background=team.color+'44';
      if(inP) cell.onclick=()=>openSched(ds);

      let html=`<div class="dnum">${cur.getDate()}</div>`;
      if(isH) html+=`<div class="hname">${S.holidays[ds]}</div>`;
      if(inP&&sched){
        if(sched.schedule_type==='volunteer'){
          const vols=(S.compsByWork[ds]||[]).filter(c=>c.work_type==='volunteer');
          if(vols.length) html+=`<div class="cmembers">${vols.map(c=>c.member_name).join(', ')}</div>`;
        } else if(team){
          html+=`<div class="cteam" style="color:${darken(team.color)}">${team.name}</div>`;
          const mems=team.members||[];
          if(mems.length) html+=`<div class="cmembers">${mems.join(', ')}</div>`;
        }
      }

      // Badges
      const badges=[];

      // Monthly dayoffs on this date
      const pdo=S.dayoffs[period.period_key]||{};
      Object.entries(pdo).forEach(([m,d])=>{
        if(d.dayoff_date===ds&&d.confirmed) badges.push(`<span class="badge b-dayoff">${m} 월차</span>`);
      });

      // Compensations on this date (comp_date = ds)
      (S.comps[ds]||[]).forEach(c=>{
        if(c.comp_type==='half_am') badges.push(`<span class="badge b-ham">${c.member_name} ~13:30</span>`);
        else if(c.comp_type==='half_pm') badges.push(`<span class="badge b-hpm">${c.member_name} 14:00~</span>`);
        else if(c.comp_type==='weekend_dayoff') badges.push(`<span class="badge b-dayoff">${c.member_name} 보상휴가</span>`);
        else if(c.comp_type==='carried') badges.push(`<span class="badge b-carried">${c.member_name} 이월</span>`);
      });

      // Warning: weekend work without confirmed comp (only for members who have a comp record)
      if(isWknd&&sched&&inP){
        const wcs=S.compsByWork[ds]||[];
        const team2=S.teams.find(t=>t.id===sched.team_id);
        if(team2&&(sched.schedule_type==='weekend_single'||sched.schedule_type==='weekend_both')&&wcs.length>0){
          wcs.forEach(c=>{
            if(!c.confirmed) badges.push(`<span class="badge b-warn">⚠ ${c.member_name}</span>`);
          });
        }
      }

      if(sched&&sched.schedule_type==='volunteer'&&inP)
        badges.push(`<span class="badge b-vol">자원</span>`);

      if(badges.length) html+=`<div class="cbadges">${badges.join('')}</div>`;

      cell.innerHTML=html;
      weekEl.appendChild(cell);
      cur.setDate(cur.getDate()+1);
    }
    body.appendChild(weekEl);
  }
  updateBadge();
}

  document.getElementById('legend').innerHTML=
    S.teams.filter(t=>t.active).map(t=>
      `<div class="lg-item"><div class="lg-dot" style="background:${t.color}"></div><span>${t.name}</span></div>`

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCHEDULE SHEET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSched(ds) {
  editDate=ds;
  workedMembers=new Set();
  memberCompTypes={};
  const sched=S.schedules[ds];
  const dt=parseDt(ds);
  const dw=dt.getDay();
  const isWknd=dw===0||dw===6;
  const isHoliday=!!S.holidays[ds];
  const isVolOnly=isWknd||isHoliday; // 주말/공휴일: 팀 없이 인원 직접 선택
  const DAY=['일','월','화','수','목','금','토'];

  document.getElementById('schedTitle').textContent=
    `${dt.getMonth()+1}월 ${dt.getDate()}일 (${DAY[dw]}) 배정`;

  // 주말/공휴일은 팀 선택기와 유형 선택기 숨김
  document.getElementById('teamSelFg').style.display=isVolOnly?'none':'block';
  document.getElementById('typeSection').style.display=isVolOnly?'none':'block';

  // Team select (평일만)
  const sel=document.getElementById('teamSel');
  sel.innerHTML='<option value="">-- 배정 없음 --</option>'+
    S.teams.filter(t=>t.active).map(t=>
      `<option value="${t.id}" ${sched&&sched.team_id===t.id?'selected':''}>${t.name}</option>`
    ).join('');

  // selectedType 결정
  if(isVolOnly){
    selectedType='volunteer';
  } else {
    selectedType=sched?sched.schedule_type:'normal';
  }

  // Pre-populate workers BEFORE rendering UI
  if(sched){
    const wcs=S.compsByWork[ds]||[];
    if(sched.schedule_type==='volunteer'){
      wcs.filter(c=>c.work_type==='volunteer').forEach(c=>workedMembers.add(c.member_name));
    } else if(isWknd){
      wcs.filter(c=>c.work_type!=='volunteer').forEach(c=>{
        workedMembers.add(c.member_name);
        memberCompTypes[c.member_name]={compType:c.comp_type,compDate:c.comp_date||''};
      });
    }
  }

  if(!isVolOnly) renderTypeGrid(isWknd,isHoliday);
  updateCompSection(isWknd);

  document.getElementById('delBtn').style.display=sched?'block':'none';
  document.getElementById('schedOverlay').classList.add('open');
}

function renderTypeGrid(isWknd,isHoliday) {
  const types=isHoliday?[
    {v:'volunteer',l:'자원근무',d:'공휴일 특별'},
  ]:isWknd?[
    {v:'weekend_single',l:'주말 하루',d:'반일 보상'},
    {v:'weekend_both',  l:'주말 양일',d:'월차 보상'},
    {v:'volunteer',     l:'자원근무', d:'특별'},
  ]:[
    {v:'normal',   l:'정상근무',d:''},
    {v:'volunteer',l:'자원근무',d:'특별'},
  ];
  let html='';
  if(isHoliday) html+='<div class="warn-box" style="margin-bottom:10px"><div class="warn-box-title">🎌 공휴일</div><div class="warn-box-sub">공휴일에는 자원근무만 배정할 수 있습니다</div></div>';
  html+=`<div class="radio-g${isHoliday?'':' three'}" style="${isHoliday?'grid-template-columns:1fr':''}">`;
  html+=types.map(t=>`<div class="ropt ${selectedType===t.v?'on':''}" onclick="selectType('${t.v}',${isWknd},${!!isHoliday})">${t.l}${t.d?`<br><small>${t.d}</small>`:''}</div>`).join('');
  html+='</div>';
  document.getElementById('typeGrid').innerHTML=html;
}

function selectType(v,isWknd,isHoliday){

  updateCompSection(isWknd);
}

function updateCompSection(isWknd){
  const cs=document.getElementById('compSection');
  if(selectedType==='volunteer'){
    cs.style.display='block';
    document.getElementById('compWarnTitle').textContent='👥 자원근무 인원';
    document.getElementById('compWarnSub').textContent='참여할 직원을 선택하거나 직접 입력하세요';

  }

    cs.style.display='none'; return;

  cs.style.display='block';

function renderVolunteerPicks(){
  const allMems=[...new Set(S.teams.filter(t=>t.active).flatMap(t=>t.members||[]))];
  const customMems=[...workedMembers].filter(m=>!allMems.includes(m));
  const all=[...allMems,...customMems];
  document.getElementById('memChecks').innerHTML=all.map(m=>
    `<div class="mem-check ${workedMembers.has(m)?'on':''}" onclick="toggleMem('${m}')"><span>${m}</span></div>`
  ).join('');
}

function addVolCustom(){
  const inp=document.getElementById('volCustomInp');
  const name=inp.value.trim();
  if(!name) return;
  workedMembers.add(name);
  inp.value='';
  renderVolunteerPicks();
}

function renderMemberChecks(){
  const teamId=parseInt(document.getElementById('teamSel').value);
  const team=S.teams.find(t=>t.id===teamId);
  if(!team){document.getElementById('memChecks').innerHTML='<div style="font-size:12px;color:#9ca3af">조를 먼저 선택하세요</div>';return;}
  const mems=team.members||[];
  document.getElementById('memChecks').innerHTML=mems.map(m=>
    `<div class="mem-check ${workedMembers.has(m)?'on':''}" onclick="toggleMem('${m}')"><span>${m}</span></div>`
  ).join('');
  renderCompPerMember(mems);
}

function toggleMem(m){
  if(workedMembers.has(m)) workedMembers.delete(m); else workedMembers.add(m);
  if(selectedType==='volunteer'){
    renderVolunteerPicks();
  } else {
    renderMemberChecks();
  }
}

    {v:'half_pm',l:'오후 반일',d:'14:00~'},

  const nextWd=nextWeekday(editDate);

    return `<div class="comp-member-block">

async function saveSchedule(){
  const ds=editDate;
  const dt=parseDt(ds);
  const dw=dt.getDay();
  const isWknd=dw===0||dw===6;
  const isHoliday=!!S.holidays[ds];
  const isVolOnly=isWknd||isHoliday;

  // 주말/공휴일: teamId 없이 저장 / 평일: 팀 선택 필수
  const teamId=isVolOnly?null:(parseInt(document.getElementById('teamSel').value)||null);
  const type=isVolOnly?'volunteer':selectedType;

  if(!isVolOnly&&!teamId){ await deleteSchedule(); return; }

  // 중복 배정 방지 (평일만)
  const period=curPeriod();
  if(!isVolOnly&&period){
    const dupDate=Object.entries(S.schedules).find(([d,sc])=>
      sc.team_id===teamId && d!==ds &&
      d>=period.start_date && d<=period.end_date
    );
    if(dupDate){
      const team=S.teams.find(t=>t.id===teamId);
      const confirmed=confirm(`⚠ ${team?.name||'해당 조'}은(는) 이미 ${dupDate[0]}에 배정되어 있습니다.\n그래도 중복 배정하시겠습니까?`);
      if(!confirmed) return;
    }
  }

  const existing=S.schedules[ds];
  const payload={date:ds,team_id:teamId,schedule_type:type,updated_at:new Date().toISOString()};
  let err;
  if(existing) ({error:err}=await db.from('schedules').update(payload).eq('id',existing.id));
  else ({error:err}=await db.from('schedules').insert(payload));
  if(err){toast('저장 실패: '+err.message);return;}

  // Clear existing comp records for this date, then re-insert fresh ones
  await db.from('compensations').delete().eq('work_date',ds);

  if(type==='volunteer'){
    // Save volunteer participants
    for(const m of workedMembers){
      await db.from('compensations').insert({
        work_date:ds,member_name:m,
        period_key:period?.period_key||null,
        work_type:'volunteer',comp_type:'volunteer',
        confirmed:true,comp_date:null,carried_to:null,
      });
    }
  } else if(type==='weekend_single'||type==='weekend_both'){
    const wt=type==='weekend_both'?'both':'single';
    for(const m of workedMembers){
      const mc=memberCompTypes[m]||{compType:type==='weekend_both'?'weekend_dayoff':'half_am',compDate:nextWeekday(ds)};
      const carried=mc.compType==='carried';
      const compPayload={
        work_date:ds,member_name:m,period_key:period?.period_key||null,
        work_type:wt,comp_type:mc.compType,
        comp_date:carried?null:mc.compDate,
        confirmed:!carried,carried_to:null,
      };
      if(carried){
        const ni=S.periods.findIndex(p=>p.period_key===period?.period_key)+1;
        const np=S.periods[ni];
        if(np){
          compPayload.carried_to=np.period_key;
          await db.from('notifications').insert({
            notif_type:'carry_over',
            message:`[${np.label||np.period_key}] ${m}의 주말 보상이 이월되었습니다. 날짜를 확정해주세요.`,
            target_date:ds,is_read:false,
          });
        }
      }
      await db.from('compensations').insert(compPayload);
    }
  }

  toast('저장되었습니다');
  overlayClose('schedOverlay');
}

async function deleteSchedule(){
  const ex=S.schedules[editDate];
  if(ex){
    await db.from('compensations').delete().eq('work_date',editDate);
    await db.from('schedules').delete().eq('id',ex.id);
  }
  toast('배정 삭제됨');
  overlayClose('schedOverlay');
}

async function autoCheckNotifs(){
  const p=curPeriod();
  if(!p) return;
  const today=new Date();
  const end=parseDt(p.end_date);
  const daysLeft=Math.floor((end-today)/(86400000));

  if(daysLeft<=7&&daysLeft>=0){
    const allMems=[...new Set(S.teams.filter(t=>t.active).flatMap(t=>t.members||[]))];
    const pdo=S.dayoffs[p.period_key]||{};
    for(const m of allMems){
      const d=pdo[m];
      if(!d||!d.confirmed){
        const exists=S.notifs.some(n=>n.notif_type==='dayoff_unused'&&n.message.includes(m)&&n.message.includes(p.period_key));
        if(!exists){
          await db.from('notifications').insert({
            notif_type:'dayoff_unused',
            message:`[${p.label||p.period_key}] ${m}의 월차가 미사용 상태입니다. (${daysLeft}일 후 종료)`,
            is_read:false,
          });
        }
      }
    }
  }

  const threeDaysAgo=new Date(); threeDaysAgo.setDate(threeDaysAgo.getDate()-3);
  Object.entries(S.compsByWork).forEach(([wd,cs])=>{
    if(parseDt(wd)<=threeDaysAgo){
      cs.forEach(async c=>{
        if(!c.confirmed){
          const exists=S.notifs.some(n=>n.notif_type==='compensation_pending'&&n.message.includes(c.member_name)&&n.message.includes(wd));
          if(!exists){
            await db.from('notifications').insert({
              notif_type:'compensation_pending',
              message:`${c.member_name}의 ${wd} 주말 보상이 미확정 상태입니다.`,
              target_date:wd,is_read:false,
            });
          }
        }
      });
    }
  });

  // Fix 8: 영업 시작 3일 전 배정 미완료 경고
  for(const p of S.periods){
    const start=parseDt(p.start_date);
    const daysUntil=Math.floor((start-today)/86400000);
    if(daysUntil>=0&&daysUntil<=3){
      const cur2=new Date(parseDt(p.start_date));
      const ed2=parseDt(p.end_date);
      let missingDays=0;
      while(cur2<=ed2){
        const ds2=fmtDate(cur2);
        const dw2=cur2.getDay();
        if(dw2!==0&&dw2!==6&&!S.holidays[ds2]&&!S.schedules[ds2]) missingDays++;
        cur2.setDate(cur2.getDate()+1);
      }
      if(missingDays>0){
        const exists=S.notifs.some(n=>n.notif_type==='schedule_incomplete'&&n.message.includes(p.period_key));
        if(!exists){
          await db.from('notifications').insert({
            notif_type:'schedule_incomplete',
            message:`[${p.label||p.period_key}] 영업 시작 ${daysUntil}일 전인데 ${missingDays}일이 미배정 상태입니다.`,
            target_date:p.start_date,is_read:false,
          });
        }
      }
    }
  }

  const {data}=await db.from('notifications').select('*').order('created_at',{ascending:false}).limit(60);
  S.notifs=data||[];
  updateBadge();
}

// EXCEL EXPORT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function generateExcelHTML(){
  const period=curPeriod();
  if(!period) return '';
  const label=period.label||period.period_key;
  const sd=parseDt(period.start_date), ed=parseDt(period.end_date);
  const cs=new Date(sd); while(cs.getDay()!==0) cs.setDate(cs.getDate()-1);
  const ce=new Date(ed); while(ce.getDay()!==6) ce.setDate(ce.getDate()+1);
  const allMems=[...new Set(S.teams.filter(t=>t.active).flatMap(t=>t.members||[]))];

  // Build week arrays
  const weeks=[];
  const cur=new Date(cs);
  while(cur<=ce){
    const wk=[];
    for(let i=0;i<7;i++){wk.push(fmtDate(cur));cur.setDate(cur.getDate()+1);}
    weeks.push(wk);
  }

  function cellBg(ds){
    const inP=ds>=period.start_date&&ds<=period.end_date;
    if(!inP) return '#f5f5f5';
    const dw=parseDt(ds).getDay();
    if(S.holidays[ds]||dw===0) return '#FFE4E4';
    if(dw===6) return '#EFF6FF';
    const sched=S.schedules[ds];
    if(sched){const team=S.teams.find(t=>t.id===sched.team_id);if(team) return team.color+'CC';}
    return '#FFFFFF';
  }

  function cellLines(ds){
    const inP=ds>=period.start_date&&ds<=period.end_date;
    if(!inP) return [];
    const sched=S.schedules[ds];
    if(!sched) return [];
    const lines=[];
    if(sched.schedule_type==='volunteer'){
      const vols=(S.compsByWork[ds]||[]).filter(c=>c.work_type==='volunteer');
      if(vols.length) lines.push(vols.map(c=>c.member_name).join(', '));
      return lines;
    }
    const team=S.teams.find(t=>t.id===sched.team_id);
    if(!team) return lines;
    // Dayoffs on this date
    const pdo=S.dayoffs[period.period_key]||{};
    const dayoffMems=new Set(Object.entries(pdo).filter(([,d])=>d.dayoff_date===ds&&d.confirmed).map(([m])=>m));
    // Active team members
    const active=(team.members||[]).filter(m=>!dayoffMems.has(m));
    if(active.length) lines.push(active.join(' '));
    // Comp records where comp_date = ds (someone taking comp today)
    (S.comps[ds]||[]).filter(c=>c.work_type!=='volunteer').forEach(c=>{
      if(c.comp_type==='half_am') lines.push(`~13:30 ${c.member_name}`);
      else if(c.comp_type==='half_pm') lines.push(`${c.member_name} 14:00~`);
      else if(c.comp_type==='weekend_dayoff') lines.push(`${c.member_name} 보상휴가`);
    });
    // Dayoff notes
    dayoffMems.forEach(m=>lines.push(`영업제외:${m}`));
    return lines;
  }

  const W=['일','월','화','수','목','금','토'];
  const hdrBg=['#FFE4E4','#F0F0F0','#F0F0F0','#F0F0F0','#F0F0F0','#F0F0F0','#EFF6FF'];
  const hdrColor=['#ef4444','#333','#333','#333','#333','#333','#3b82f6'];

  let h=`<table border="1" cellpadding="0" cellspacing="0" style="border-collapse:collapse;font-family:'맑은 고딕',Arial,sans-serif;font-size:9pt">`;

  // Title row
  h+=`<tr><td colspan="7" align="center" style="background:#4472C4;color:white;font-size:14pt;font-weight:bold;padding:10px 4px;height:44px">${label} 영업 활동 일정표</td></tr>`;
  // Subtitle row
  h+=`<tr><td colspan="7" align="center" style="font-size:10pt;padding:4px;height:26px">${label}(경력${allMems.length}명)</td></tr>`;
  // Day header row
  h+=`<tr>`;
  for(let d=0;d<7;d++)
    h+=`<td align="center" style="background:${hdrBg[d]};color:${hdrColor[d]};font-weight:bold;padding:5px;min-width:110px;border:1px solid #999">${W[d]}</td>`;
  h+=`</tr>`;

  // Weeks: 2 rows per week (date number row + content row)
  for(const wk of weeks){
    // Date number row (thin)
    h+=`<tr style="height:20px">`;
    for(const ds of wk){
      const inP=ds>=period.start_date&&ds<=period.end_date;
      const dt=parseDt(ds); const dw=dt.getDay(); const isH=!!S.holidays[ds];
      const bg=cellBg(ds);
      const color=isH||dw===0?'#ef4444':dw===6?'#3b82f6':'#333';
      let dateLabel=String(dt.getDate());
      if(isH&&inP) dateLabel+=`(${S.holidays[ds]})`;
      h+=`<td style="background:${bg};vertical-align:middle;padding:2px 4px;font-size:8pt;color:${color};font-weight:bold;border:1px solid #ccc">`;
      h+=inP?dateLabel:`<span style="color:#ccc">${dt.getDate()}</span>`;
      h+=`</td>`;
    }
    h+=`</tr>`;

    // Content row (tall)
    h+=`<tr style="height:72px">`;
    for(const ds of wk){
      const bg=cellBg(ds);
      const lines=cellLines(ds);
      const content=lines.map(l=>`<div>${l}</div>`).join('');
      h+=`<td style="background:${bg};vertical-align:top;padding:4px;font-size:9pt;border:1px solid #ccc">${content}</td>`;
    }
    h+=`</tr>`;
  }

  // Business hours section
  h+=`<tr>
    <td rowspan="2" align="center" style="font-weight:bold;background:#E8E8E8;padding:4px;border:1px solid #999">영업시간</td>
    <td style="font-weight:bold;background:#F5F5F5;padding:4px;border:1px solid #ccc">평일</td>
    <td style="font-weight:bold;padding:4px;border:1px solid #ccc">주간</td>
    <td colspan="2" align="center" style="padding:4px;border:1px solid #ccc">09:30~18:00</td>
    <td style="font-weight:bold;padding:4px;border:1px solid #ccc">야간</td>
    <td style="padding:4px;border:1px solid #ccc">메인 : 18:00~22:00<br>서브 : 18:00~21:00</td>
  </tr>
  <tr>
    <td style="font-weight:bold;background:#F5F5F5;padding:4px;border:1px solid #ccc">주말</td>
    <td colspan="5" align="center" style="padding:4px;border:1px solid #ccc">메인 : 09:30~18:00&nbsp;&nbsp;&nbsp;서브 : 09:30~16:00</td>
  </tr>`;

  // Team summary
  const activeTeams=S.teams.filter(t=>t.active);
  h+=`<tr><td align="center" style="font-weight:bold;background:#E8E8E8;padding:4px;border:1px solid #999">영업조</td>`;
  for(let i=0;i<6;i++){
    const t=activeTeams[i];
    if(t) h+=`<td align="center" style="background:${t.color}CC;padding:8px;font-weight:bold;border:1px solid #ccc">${(t.members||[]).join(',')}<br><span style="font-size:10pt">${i+1}</span></td>`;
    else h+=`<td style="border:1px solid #ccc"></td>`;
  }
  h+=`</tr></table>`;
  return h;
}

async function saveExcel(){
  const period=curPeriod();
  if(!period){toast('영업 월을 먼저 선택하세요');return;}
  const html=generateExcelHTML();
  const fullHtml=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body>${html}</body></html>`;
  const blob=new Blob([fullHtml],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${period.period_key}-duty-roster.xls`;
  a.click();
  toast('엑셀 파일 저장됨');
}

async function copyToExcel(){
  const period=curPeriod();
  if(!period){toast('영업 월을 먼저 선택하세요');return;}
  const html=generateExcelHTML();
  const fullHtml=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><meta name=ProgId content=Excel.Sheet><meta name=Generator content="Microsoft Excel 15"></head><body>${html}</body></html>`;
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'})})]);
    toast('클립보드 복사 완료 — 엑셀에 붙여넣기 하세요');
  }catch(e){
    // Fallback: .xls download
    const blob=new Blob([fullHtml],{type:'application/vnd.ms-excel;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${period.period_key}-duty-roster.xls`;
    a.click();
    toast('엑셀 파일로 다운로드됨');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATA BACKUP / RESTORE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function exportData(){
  // Deduplicate compensations (stored in both S.comps and S.compsByWork)
  const compMap={};
  [...Object.values(S.comps).flat(),...Object.values(S.compsByWork).flat()].forEach(c=>{if(c.id)compMap[c.id]=c;});
  const data={
    teams:S.teams,
    periods:S.periods,
    holidays:Object.entries(S.holidays).map(([date,name])=>({date,name})),
    schedules:Object.values(S.schedules),
    compensations:Object.values(compMap),
    dayoffs:Object.values(S.dayoffs).flatMap(x=>Object.values(x)),
    exportedAt:new Date().toISOString(),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`duty-roster-backup-${fmtDate(new Date())}.json`;
  a.click();
  toast('내보내기 완료');
}

async function importData(event){
  const file=event.target.files[0];
  if(!file) return;
  if(!confirm('현재 모든 데이터를 백업 파일로 교체합니다.\n계속하시겠습니까?')){event.target.value='';return;}
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(data.teams?.length){
      await db.from('teams').delete().neq('id',0);
      for(const t of data.teams) await db.from('teams').upsert(t,{onConflict:'id'});
    }
    if(data.periods?.length){
      await db.from('business_periods').delete().neq('id',0);
      for(const p of data.periods) await db.from('business_periods').upsert(p,{onConflict:'id'});
    }
    if(data.holidays?.length){
      await db.from('holidays').delete().neq('date','0000-00-00');
      await db.from('holidays').insert(data.holidays);
    }
    if(data.schedules?.length){
      await db.from('schedules').delete().neq('id',0);
      for(const s of data.schedules) await db.from('schedules').upsert(s,{onConflict:'id'});
    }
    if(data.compensations?.length){
      await db.from('compensations').delete().neq('id',0);
      for(const c of data.compensations) await db.from('compensations').upsert(c,{onConflict:'id'});
    }
    if(data.dayoffs?.length){
      await db.from('monthly_dayoffs').delete().neq('id',0);
      for(const d of data.dayoffs) await db.from('monthly_dayoffs').upsert(d,{onConflict:'id'});
    }
    await loadAll();
    render();
    toast('복원 완료');
  }catch(e){toast('오류: '+e.message);}
  event.target.value='';
}

// UTILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmtDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDt(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function nextWeekday(ds){
  const d=parseDt(ds);d.setDate(d.getDate()+1);
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
  return fmtDate(d);
}
function darken(hex){
  if(!hex||hex.length<7) return '#333';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-90)},${Math.max(0,g-90)},${Math.max(0,b-90)})`;
}
function fmtDT(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function overlayClose(id,e){
  if(e&&e.target!==document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
  if(id==='schedOverlay') editDate=null;
}
